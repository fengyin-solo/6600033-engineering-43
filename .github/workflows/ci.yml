name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov httpx

      - name: Run Ruff lint
        working-directory: backend
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Run backend tests
        working-directory: backend
        run: |
          source .venv/bin/activate
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest -v --cov=. --cov-report=term
          else
            echo "No backend tests found, skipping."
          fi

  frontend:
    name: Frontend Lint, TypeCheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint 2>/dev/null || echo "ESLint not fully configured, continuing."

      - name: TypeScript type check
        working-directory: frontend
        run: npx vue-tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  api-check:
    name: API Contract Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      backend:
        image: python:3.11-slim
        env:
          PORT: 8000
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps and start API
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install httpx
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/ || (echo "Backend failed to start" && exit 1)

      - name: Check OpenAPI schema
        run: |
          curl -f http://localhost:8000/openapi.json -o /tmp/openapi.json
          echo "OpenAPI schema fetched successfully"
          python3 -c "import json; s=json.load(open('/tmp/openapi.json')); print(f'Paths: {len(s.get(\"paths\", {}))}')"
